<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F7F2FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>SAGE - AI Counselor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg">
  <div class="card" id="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-label="SAGE logo">
            <rect width="36" height="36" rx="10" fill="#8B5CF6"/>
            <path d="M18 8C14 8 11 11 11 15C11 20 18 28 18 28C18 28 25 20 25 15C25 11 22 8 18 8Z" fill="white" opacity="0.9"/>
            <path d="M14 14C14 14 16 12 18 14C20 12 22 14 22 14" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="header-text">
          <h1 class="title">SAGE</h1>
          <span class="subtitle">AI Counselor</span>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="reset-btn" title="New conversation" aria-label="New conversation">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
        <button class="icon-btn close-btn" id="close-btn" title="Close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <div class="chat-area" id="chat-area">
      <div class="timestamp" id="timestamp">Today</div>
      <div class="messages" id="messages"></div>
      <div class="scroll-anchor" id="scroll-anchor"></div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <button class="input-icon-btn" id="emoji-btn" title="Emoji" aria-label="Emoji" type="button">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
            <line x1="9" y1="9" x2="9.01" y2="9"></line>
            <line x1="15" y1="9" x2="15.01" y2="9"></line>
          </svg>
        </button>
        <input type="text" class="text-input" id="text-input" placeholder="Type your name..." autofocus autocomplete="off" enterkeyhint="send" inputmode="text">
        <button class="input-icon-btn" id="attach-btn" title="Attach file" aria-label="Attach file" type="button">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
          </svg>
        </button>
        <button class="send-btn" id="send-btn" title="Send" aria-label="Send" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-badge">
        <span aria-hidden="true">🛡</span> Safe &bull; Private &bull; Confidential
      </div>
      <p class="footer-note">This is not a substitute for professional help.</p>
    </footer>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
